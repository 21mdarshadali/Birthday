<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Countdown</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Poppins', 'Trebuchet MS', sans-serif;
        }

        .app-wrapper {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 25%, #fbc2eb 50%, #a6c1ee 75%, #f68084 100%);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0.8);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        .countdown-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
            margin-top: auto;
            margin-bottom: auto;
        }

        .countdown-card::before {
            content: "🎈";
            font-size: 60px;
            position: absolute;
            top: -20px;
            left: -20px;
            opacity: 0.15;
        }

        .countdown-card::after {
            content: "🎉";
            font-size: 60px;
            position: absolute;
            bottom: -20px;
            right: -20px;
            opacity: 0.15;
        }

        .countdown-title {
            font-size: 1.5rem;
            color: #ff5f9e;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(255, 105, 180, 0.2);
        }

        .countdown-subtitle {
            font-size: 1.1rem;
            color: #ff7eb3;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .timer-box {
            background: linear-gradient(145deg, #ffe6f0, #fff);
            border-radius: 15px;
            padding: 15px 10px;
            box-shadow: 0 5px 10px rgba(255, 182, 193, 0.2);
            transition: all 0.3s ease;
        }

        .timer-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(255, 182, 193, 0.35);
        }

        .counter-digit {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff5f9e;
            line-height: 1;
            display: block;
        }

        .counter-label {
            font-size: 0.7rem;
            color: #888;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .status-message {
            text-align: center;
            color: #ff7eb3;
            font-size: 0.95rem;
            /* margin-bottom: 20px; */
            font-weight: 500;
        }

        .celebration-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 1.8rem;
        }

        #celebrate-btn {
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @media (max-width: 640px) {
            .countdown-card {
                padding: 30px 20px;
            }

            .counter-digit {
                font-size: 1.4rem;
            }

            .countdown-title {
                font-size: 1.3rem;
            }
        }

        /* 🔥 Button Pulse Animation */
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 118, 140, 0.6);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 15px rgba(255, 118, 140, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 118, 140, 0);
            }
        }

        /* Apply animation */
        #celebrate-btn {
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        /* Only when visible */
        #celebrate-btn.active {
            animation: pulse 2s infinite;
        }

        /* Hover effect */
        #celebrate-btn:hover {
            transform: translateY(-3px) scale(1.05);
        }

        /* Click effect */
        #celebrate-btn:active {
            transform: scale(0.95);
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
        #next-btn {
            transform: translate(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 118, 140, 0.3);
        }
        #next-btn:hover {
            transform: translate(-3px) scale(1.05);
        }   

        .fade {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="gradient-bg">
    <div id="page1">
        <div class="app-wrapper">
            <div class="flex-1 flex flex-col items-center justify-center min-h-screen px-4">
                <div class="countdown-card">
                    <div class="text-center">
                        <div style="margin-bottom: 16px; font-size: 3rem; animation: bounce 2s infinite;">
                            🎂
                        </div>
                        <h1 class="countdown-title">Enjoy your special day</h1>
                        <p class="countdown-subtitle" id="person-display">Celebrate with Someone Special</p>
                        <p id="birthday-date" style="font-size: 0.9rem; color: #999;margin-bottom: 10px;"></p>
                        <div class="timer-grid">
                            <div class="timer-box"><span class="counter-digit" id="days-count">00</span>
                                <div class="counter-label">
                                    Days
                                </div>
                            </div>
                            <div class="timer-box"><span class="counter-digit" id="hours-count">00</span>
                                <div class="counter-label">
                                    Hours
                                </div>
                            </div>
                            <div class="timer-box"><span class="counter-digit" id="minutes-count">00</span>
                                <div class="counter-label">
                                    Minutes
                                </div>
                            </div>
                            <div class="timer-box"><span class="counter-digit" id="seconds-count">00</span>
                                <div class="counter-label">
                                    Seconds
                                </div>
                            </div>
                        </div>
                        <p class="status-message" id="status-message">Until the big day!</p>
                        <button id="celebrate-btn" style="
    display:none;
    margin-top: 15px;
    padding: 12px 20px;
    border: none;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
">
                            🎉 Let's Celebrate➡️
                        </button>
                        <div class="celebration-icons"><span>🎈</span> <span>✨</span> <span>🎉</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <script>
            const defaultConfig = {
                person_name: "MD ARSHAD ALI",
                birth_month: 3,
                birth_day: 19
            };

            let config = { ...defaultConfig };

            const elementHandler = {
                defaultConfig,
                onConfigChange: async (newConfig) => {
                    config = newConfig;
                    updateDisplay();
                    updateCountdown();
                },
                mapToCapabilities: () => ({
                    recolorables: [],
                    borderables: [],
                    fontEditable: undefined,
                    fontSizeable: undefined
                }),
                mapToEditPanelValues: (cfg) => new Map([
                    ["person_name", cfg.person_name || defaultConfig.person_name],
                    ["birth_month", String(cfg.birth_month || defaultConfig.birth_month)],
                    ["birth_day", String(cfg.birth_day || defaultConfig.birth_day)]
                ])
            };

            function updateDisplay() {
                const nameDisplay = document.getElementById('person-display');
                const dateDisplay = document.getElementById('birthday-date');

                const birthMonth = parseInt(config.birth_month);
                const birthDay = parseInt(config.birth_day);

                // 👉 Month names
                const months = [
                    "January", "February", "March", "April", "May", "June",
                    "July", "August", "September", "October", "November", "December"
                ];

                if (config.person_name && config.person_name.trim()) {
                    nameDisplay.textContent = `🎈 ${config.person_name}'s Birthday 🎈`;
                } else {
                    nameDisplay.textContent = "Celebrate with Someone Special";
                }

                // 👉 Show formatted date
                dateDisplay.textContent = `🎂 ${birthDay} ${months[birthMonth - 1]}`;
            }

            function calculateCountdown() {
                const now = new Date();

                // 👉 Remove time part (important fix)
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

                const birthMonth = parseInt(config.birth_month) || defaultConfig.birth_month;
                const birthDay = parseInt(config.birth_day) || defaultConfig.birth_day;

                // 👉 Birthday this year (no time)
                let birthday = new Date(now.getFullYear(), birthMonth - 1, birthDay);

                // ✅ CASE 1: Today is birthday
                if (today.getTime() === birthday.getTime()) {
                    return { days: 0, hours: 0, minutes: 0, seconds: 0, isBirthday: true };
                }

                // ✅ CASE 2 & 3: Future or shift to next year
                if (now > birthday) {
                    birthday = new Date(now.getFullYear() + 1, birthMonth - 1, birthDay);
                }

                const diff = birthday - now;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const minutes = Math.floor((diff / (1000 * 60)) % 60);
                const seconds = Math.floor((diff / 1000) % 60);

                return { days, hours, minutes, seconds, isBirthday: false };
            }

            let hasCelebrated = false;

            function updateCountdown() {
                const countdown = calculateCountdown();

                document.getElementById('days-count').textContent = String(countdown.days).padStart(2, '0');
                document.getElementById('hours-count').textContent = String(countdown.hours).padStart(2, '0');
                document.getElementById('minutes-count').textContent = String(countdown.minutes).padStart(2, '0');
                document.getElementById('seconds-count').textContent = String(countdown.seconds).padStart(2, '0');

                const statusEl = document.getElementById('status-message');

                const btn = document.getElementById("celebrate-btn");

                if (countdown.isBirthday) {
                    statusEl.textContent = "🎊 It's Birthday Time! 🎊";

                    btn.style.display = "inline-block";
                    btn.classList.add("active");
                    if (!hasCelebrated) {
                        createConfetti();   // 🎉 only once
                        hasCelebrated = true;
                    }

                } else {
                    statusEl.textContent = "Until the big day!";
                    btn.style.display = "none";
                    btn.classList.remove("active");
                    hasCelebrated = false;
                }
            }

            function createConfetti() {
                if (Math.random() > 0.7) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = ['🎉', '🎈', '✨', '🎂'][Math.floor(Math.random() * 4)];
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.fontSize = (Math.random() * 20 + 20) + 'px';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 3000);
                }
            }

            async function init() {
                if (window.elementSdk) {
                    await window.elementSdk.init(elementHandler);
                }
                updateDisplay();
                updateCountdown();
                setInterval(updateCountdown, 1000);
            }

            init();

            document.getElementById("celebrate-btn").onclick = function () {
                document.getElementById("page1").style.display = "none";
                document.getElementById("page2").style.display = "flex";
                document.getElementById("slide-text").innerText = slides[0]();
            };
        </script>
    </div>

    <div id="page2" style="display:none; height:100vh; justify-content:center; align-items:center;">

        <div style="
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 25px;
        text-align: center;
        width: 320px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        backdrop-filter: blur(10px);
        transition: 0.3s ease;
    ">

            <div style="font-size:60px; animation: bounce 2s infinite;">🐰</div>

            <h2 id="slide-text" style="margin:20px 0;">
                Happy Birthday 🎂
            </h2>

            <button id="next-btn" onclick="nextSlide()" style="
            padding: 12px 25px;
            border: none;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(255, 118, 140, 0.3);
            transition: all 0.3s ease;
        ">
                Next
            </button>

          <div id="dots" style="margin-top:15px; display:flex; justify-content:center; gap:8px;"></div>

        </div>
    </div>

    <script>
        const slides = [
            () => `Happy Birthday ${config.person_name}! 🎂`,
            () => "Our bond is Sweet, Loyal, My rock",
            () => "The vibe with you is Sweet & Warm",
            () => "Do you wanna see what I made for you?"
        ];

        let currentSlide = 0;

        function nextSlide() {
            currentSlide++;

            if (currentSlide >= slides.length) {
                currentSlide = slides.length - 1;
                return;
            }

            document.getElementById("slide-text").innerText = slides[currentSlide]();

            updateDots();
            // 👇 ADD THIS
            const btn = document.getElementById("next-btn");
            if (currentSlide === slides.length - 1) {
                btn.innerText = "Let's Go 🎉";
            } else {
                btn.innerText = "Next";
            }
        }

        function updateDots() {
            let dots = "";

            for (let i = 0; i < slides.length; i++) {
                dots += (i === currentSlide) ? "● " : "○ ";
            }

            document.getElementById("dots").innerText = dots;
        }

        function updateDots() {
    const container = document.getElementById("dots");
    container.innerHTML = "";

    for (let i = 0; i < slides.length; i++) {
        const dot = document.createElement("div");

        dot.style.width = (i === currentSlide) ? "12px" : "8px";
        dot.style.height = (i === currentSlide) ? "12px" : "8px";
        dot.style.borderRadius = "50%";
        dot.style.background = (i === currentSlide) ? "#ff5f9e" : "#ccc";
        dot.style.transition = "0.3s";

        container.appendChild(dot);
    }
}
    </script>
</body>

</html>
