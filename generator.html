<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eid Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-4">🎉 Eid Link Generator</h1>

        <!-- Input -->
        <input 
            id="nameInput"
            type="text"
            placeholder="Enter Name (e.g. Daisy Aapi)"
            class="w-full p-3 rounded-lg text-black mb-4 outline-none"
        >

        <!-- Generate Button -->
        <button onclick="generateLink()" 
            class="bg-yellow-500 hover:bg-yellow-600 text-black px-4 py-2 rounded-lg w-full mb-4">
            Generate Link
        </button>

        <!-- Output -->
        <textarea 
            id="output"
            readonly
            class="w-full p-3 rounded-lg text-black h-20 mb-3"
            placeholder="Your link will appear here..."
        ></textarea>

        <!-- Copy Button -->
        <button onclick="copyLink()" 
            class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg w-full">
            Copy Link
        </button>
    </div>

    <script>
        function generateLink() {
            const name = document.getElementById("nameInput").value.trim();

            if (!name) {
                alert("Please enter a name");
                return;
            }

            const encoded = btoa(name);

            const baseUrl = "http://127.0.0.1:5500/eid.html"; // change later when hosted

            const finalLink = `${baseUrl}?u=${encoded}`;

            document.getElementById("output").value = finalLink;
        }

        function copyLink() {
            const output = document.getElementById("output");

            if (!output.value) {
                alert("Generate link first!");
                return;
            }

            output.select();
            document.execCommand("copy");

            alert("Link copied! ✅");
        }
    </script>

</body>
</html>
